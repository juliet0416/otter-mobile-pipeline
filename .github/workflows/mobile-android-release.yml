name: Mobile Android Release
run-name: Android ${{ github.event.client_payload.ref || inputs.ref }} (${{ github.event.client_payload.target || inputs.target || 'internal' }}, ${{ github.event.client_payload.artifact_type || inputs.artifact_type || 'aab' }})

on:
  repository_dispatch:
    types: [mobile-android-release]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Source repo ref/tag to build, e.g. mobile-v1.0.3'
        required: true
      target:
        description: 'Google Play track/distribution target'
        required: true
        default: internal
        type: choice
        options:
          - internal
          - external
          - production
          - cn
      artifact_type:
        description: 'Android artifact type'
        required: true
        default: aab
        type: choice
        options:
          - aab
          - apk
      release_env:
        description: 'Runtime backend environment baked into the app'
        required: true
        default: production
        type: choice
        options:
          - production
          - test
      version:
        description: 'Optional semver override, e.g. 1.0.3'
        required: false
      build_number:
        description: 'Optional versionCode override. Must be higher than the last Play upload.'
        required: false
      build_number_offset:
        description: 'Offset added to the CI-resolved Play versionCode when build_number is empty.'
        required: false
        default: '0'
      submit:
        description: 'Upload AAB to Google Play'
        required: true
        default: false
        type: boolean
      clear_cache:
        description: 'Ignore existing Gradle cache and write a fresh cache'
        required: true
        default: false
        type: boolean
      upload_private_release:
        description: 'Upload artifact to the source repo GitHub Release'
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: mobile-android-${{ github.event.client_payload.ref || inputs.ref }}-${{ github.event.client_payload.target || inputs.target || 'internal' }}-${{ github.event.client_payload.artifact_type || inputs.artifact_type || 'aab' }}
  cancel-in-progress: true

env:
  SOURCE_REPO: ${{ secrets.SOURCE_REPO }}
  MOBILE_ARTIFACT_PREFIX: ${{ secrets.MOBILE_ARTIFACT_PREFIX }}
  MOBILE_SOURCE_REF: ${{ github.event.client_payload.ref || github.event.client_payload.tag || inputs.ref }}
  MOBILE_TARGET: ${{ github.event.client_payload.target || inputs.target || 'internal' }}
  MOBILE_ARTIFACT_TYPE: ${{ github.event.client_payload.artifact_type || inputs.artifact_type || 'aab' }}
  MOBILE_RELEASE_ENV: ${{ github.event.client_payload.release_env || inputs.release_env || 'production' }}
  MOBILE_VERSION: ${{ github.event.client_payload.version || inputs.version }}
  MOBILE_BUILD_NUMBER: ${{ github.event.client_payload.build_number || inputs.build_number }}
  MOBILE_BUILD_NUMBER_OFFSET: ${{ github.event.client_payload.build_number_offset || inputs.build_number_offset || '0' }}
  MOBILE_RELEASE_ITEMS: ${{ toJson(github.event.client_payload.items) }}
  CLEAR_CACHE: ${{ github.event.client_payload.clear_cache || inputs.clear_cache }}
  SUBMIT_TO_STORE: ${{ github.event.client_payload.submit || inputs.submit }}
  UPLOAD_PRIVATE_RELEASE: ${{ github.event.client_payload.upload_private_release || inputs.upload_private_release }}
  FEISHU_RELEASE_WEBHOOK_URL: ${{ vars.FEISHU_RELEASE_WEBHOOK_URL || secrets.FEISHU_RELEASE_WEBHOOK_URL }}
  FEISHU_RELEASE_WEBHOOK_SECRET: ${{ secrets.FEISHU_RELEASE_WEBHOOK_SECRET || vars.FEISHU_RELEASE_WEBHOOK_SECRET }}
  ALIYUN_OSS_BUCKET: ${{ vars.ALIYUN_OSS_BUCKET || secrets.ALIYUN_OSS_BUCKET || 'chat2db-cdn' }}
  ALIYUN_OSS_ENDPOINT: ${{ vars.ALIYUN_OSS_ENDPOINT || secrets.ALIYUN_OSS_ENDPOINT }}
  ALIYUN_OSS_PREFIX: ${{ vars.ALIYUN_OSS_PREFIX || 'ottermind/mobile/android' }}
  ALIYUN_OSS_PUBLIC_BASE_URL: ${{ vars.ALIYUN_OSS_PUBLIC_BASE_URL }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      source_ref: ${{ steps.resolve.outputs.source_ref }}
      safe_ref: ${{ steps.resolve.outputs.safe_ref }}
      target: ${{ steps.resolve.outputs.target }}
      version: ${{ steps.resolve.outputs.version }}
      build_number: ${{ steps.resolve.outputs.build_number }}
      release_env: ${{ steps.resolve.outputs.release_env }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
      android_track: ${{ steps.resolve.outputs.android_track }}
      android_release_status: ${{ steps.resolve.outputs.android_release_status }}
      expo_public_region: ${{ steps.resolve.outputs.expo_public_region }}
      expo_public_api_base_url: ${{ steps.resolve.outputs.expo_public_api_base_url }}
      clear_cache: ${{ steps.resolve.outputs.clear_cache }}
      submit_to_store: ${{ steps.resolve.outputs.submit_to_store }}
      upload_private_release: ${{ steps.resolve.outputs.upload_private_release }}
      artifact_type: ${{ steps.resolve.outputs.artifact_type }}
      gradle_task: ${{ steps.resolve.outputs.gradle_task }}
      output_glob: ${{ steps.resolve.outputs.output_glob }}
      artifact_name: ${{ steps.resolve.outputs.android_artifact_name }}
      matrix: ${{ steps.resolve.outputs.matrix }}
      submit_matrix: ${{ steps.resolve.outputs.submit_matrix }}
      has_submit: ${{ steps.resolve.outputs.has_submit }}
    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      - name: Resolve release inputs
        id: resolve
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
          ANDROID_PACKAGE_NAME: ${{ secrets.ANDROID_PACKAGE_NAME }}
        run: node scripts/resolve-mobile-release.mjs

  build:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        release: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      - name: Validate source repo configuration
        env:
          SOURCE_REPO: ${{ env.SOURCE_REPO }}
          SOURCE_REPO_PAT: ${{ secrets.SOURCE_REPO_PAT }}
        run: |
          set -euo pipefail
          test -n "$SOURCE_REPO" || (echo "SOURCE_REPO secret is required" >&2; exit 1)
          test -n "$SOURCE_REPO_PAT" || (echo "SOURCE_REPO_PAT secret is required" >&2; exit 1)

      - name: Checkout source app
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ needs.prepare.outputs.source_ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          path: source

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.6'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          cache-write-only: ${{ needs.prepare.outputs.clear_cache == 'true' }}
          cache-cleanup: on-success

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install JS dependencies
        working-directory: source
        run: bun install --frozen-lockfile

      - name: Restore Android signing and Firebase files
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          GOOGLE_SERVICES_PROD_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_PROD_JSON_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$ANDROID_KEYSTORE_BASE64" || (echo "ANDROID_KEYSTORE_BASE64 is required" >&2; exit 1)
          test -n "$GOOGLE_SERVICES_PROD_JSON_BASE64" || (echo "GOOGLE_SERVICES_PROD_JSON_BASE64 is required" >&2; exit 1)

          mkdir -p source/apps/mobile/android/app
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > source/apps/mobile/android/app/ci-upload.keystore
          mkdir -p source/apps/mobile/secrets
          printf '%s' "$GOOGLE_SERVICES_PROD_JSON_BASE64" | base64 --decode > source/apps/mobile/secrets/google-services-prod.json

      - name: Update managed app version
        working-directory: source/apps/mobile
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const version = process.env.MOBILE_VERSION;
          if (!/^\d+\.\d+\.\d+$/.test(version)) {
            throw new Error(`Invalid MOBILE_VERSION: ${version}`);
          }

          const pkgPath = 'package.json';
          const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
          pkg.version = version;
          fs.writeFileSync(pkgPath, `${JSON.stringify(pkg, null, 2)}\n`);

          const appConfigPath = 'app.config.ts';
          const appConfig = fs.readFileSync(appConfigPath, 'utf8');
          const nextAppConfig = appConfig.replace(
            /(version:\s*['"])(\d+\.\d+\.\d+)(['"])/,
            `$1${version}$3`,
          );
          if (nextAppConfig === appConfig) {
            throw new Error('Could not update app.config.ts version');
          }
          fs.writeFileSync(appConfigPath, nextAppConfig);
          console.log(`[version] managed app version set to ${version}`);
          NODE
        env:
          MOBILE_VERSION: ${{ needs.prepare.outputs.version }}

      - name: Generate Android native project
        working-directory: source/apps/mobile
        env:
          EXPO_NO_DOTENV: '1'
          EXPO_PUBLIC_APP_CHANNEL: production
          EXPO_PUBLIC_RELEASE_ENV: ${{ matrix.release.release_env }}
          EXPO_PUBLIC_REGION: ${{ matrix.release.expo_public_region }}
          EXPO_PUBLIC_API_BASE_URL: ${{ matrix.release.expo_public_api_base_url }}
          SENTRY_DISABLE_AUTO_UPLOAD: 'true'
        run: bunx expo prebuild --platform android --clean --no-install

      - name: Restore Android runtime files after prebuild
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          GOOGLE_SERVICES_PROD_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_PROD_JSON_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > source/apps/mobile/android/app/ci-upload.keystore
          printf '%s' "$GOOGLE_SERVICES_PROD_JSON_BASE64" | base64 --decode > source/apps/mobile/android/app/google-services.json

      - name: Update Android native version
        working-directory: source/apps/mobile
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const buildGradlePath = 'android/app/build.gradle';
          const version = process.env.MOBILE_VERSION;
          const versionCode = process.env.MOBILE_BUILD_NUMBER;
          let text = fs.readFileSync(buildGradlePath, 'utf8');
          text = text.replace(/versionName\s+["'][^"']+["']/, `versionName "${version}"`);
          text = text.replace(/versionCode\s+\d+/, `versionCode ${versionCode}`);
          fs.writeFileSync(buildGradlePath, text);
          console.log(`[version] android versionName=${version} versionCode=${versionCode}`);
          NODE
        env:
          MOBILE_VERSION: ${{ matrix.release.version }}
          MOBILE_BUILD_NUMBER: ${{ matrix.release.build_number }}

      - name: Configure Android release signing
        run: node scripts/configure-android-signing.mjs source/apps/mobile/android/app/build.gradle

      - name: Build Android artifact
        working-directory: source/apps/mobile/android
        env:
          EXPO_NO_DOTENV: '1'
          EXPO_PUBLIC_APP_CHANNEL: production
          EXPO_PUBLIC_RELEASE_ENV: ${{ matrix.release.release_env }}
          EXPO_PUBLIC_REGION: ${{ matrix.release.expo_public_region }}
          EXPO_PUBLIC_API_BASE_URL: ${{ matrix.release.expo_public_api_base_url }}
          SENTRY_DISABLE_AUTO_UPLOAD: 'true'
          ORG_GRADLE_PROJECT_CI_UPLOAD_STORE_FILE: ci-upload.keystore
          ORG_GRADLE_PROJECT_CI_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_CI_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_CI_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew ${{ matrix.release.gradle_task }} --no-daemon --stacktrace

      - name: Collect Android artifact
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .private/artifacts
          shopt -s nullglob
          files=( source/${{ matrix.release.output_glob }} )
          if [ ${#files[@]} -eq 0 ]; then
            echo "No artifact matched: ${{ matrix.release.output_glob }}" >&2
            find source/apps/mobile/android/app/build/outputs -type f | sort || true
            exit 1
          fi
          cp "${files[0]}" ".private/artifacts/${{ matrix.release.artifact_name }}"
          echo "artifact_path=.private/artifacts/${{ matrix.release.artifact_name }}" >> "$GITHUB_OUTPUT"
          ls -lh .private/artifacts

      - name: Upload artifact to source repo release
        if: matrix.release.upload_private_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.SOURCE_REPO_PAT }}
        run: |
          set -euo pipefail
          prerelease_flag=""
          if [ "${{ matrix.release.prerelease }}" = "true" ]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "${{ matrix.release.safe_ref }}" \
            -R "${{ env.SOURCE_REPO }}" \
            --title "Mobile app ${{ matrix.release.safe_ref }}" \
            --notes "" \
            ${prerelease_flag:+$prerelease_flag} \
            || echo "Release already exists: ${{ matrix.release.safe_ref }}"
          gh release upload "${{ matrix.release.safe_ref }}" \
            "${{ steps.collect.outputs.artifact_path }}" \
            -R "${{ env.SOURCE_REPO }}" \
            --clobber

      - name: Resolve OSS upload target
        id: oss
        env:
          OSS_ARTIFACT_NAME: ${{ matrix.release.artifact_name }}
          OSS_ARTIFACT_PATH: ${{ steps.collect.outputs.artifact_path }}
          OSS_ARTIFACT_TYPE: ${{ matrix.release.artifact_type }}
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          OSS_BUILD_NUMBER: ${{ matrix.release.build_number }}
          OSS_BUCKET: ${{ env.ALIYUN_OSS_BUCKET }}
          OSS_ENDPOINT: ${{ env.ALIYUN_OSS_ENDPOINT }}
          OSS_PREFIX: ${{ env.ALIYUN_OSS_PREFIX }}
          OSS_PUBLIC_BASE_URL: ${{ env.ALIYUN_OSS_PUBLIC_BASE_URL }}
          OSS_TARGET: ${{ matrix.release.target }}
          OSS_VERSION: ${{ matrix.release.version }}
        run: node scripts/resolve-oss-upload.mjs

      - name: Upload China APK to OSS
        id: upload_oss
        if: steps.oss.outputs.enabled == 'true'
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ env.ALIYUN_OSS_BUCKET }}
          OSS_ENDPOINT: ${{ steps.oss.outputs.endpoint }}
          OSS_OBJECT_KEY: ${{ steps.oss.outputs.object_key }}
          OSS_SOURCE: ${{ steps.oss.outputs.source }}
        run: node scripts/upload-oss-artifact.mjs

      - name: Skip OSS upload
        if: steps.oss.outputs.enabled != 'true'
        run: echo "${{ steps.oss.outputs.reason }}"

      - name: Write Android release summary
        if: always()
        shell: bash
        env:
          RELEASE_ITEM_JSON: ${{ toJson(matrix.release) }}
          BUILD_RESULT: ${{ job.status }}
          OSS_UPLOAD: ${{ steps.oss.outputs.enabled }}
          OSS_UPLOAD_RESULT: ${{ steps.upload_oss.outcome }}
          OSS_DESTINATION: ${{ steps.oss.outputs.destination }}
          OSS_PUBLIC_URL: ${{ steps.oss.outputs.public_url }}
        run: |
          set -euo pipefail
          mkdir -p .private/release-summaries
          node - <<'NODE'
          const fs = require('node:fs');
          const item = JSON.parse(process.env.RELEASE_ITEM_JSON);
          const summary = {
            target: item.target,
            artifactType: item.artifact_type,
            artifactName: item.artifact_name,
            buildNumber: item.build_number,
            buildResult: process.env.BUILD_RESULT || 'unknown',
            submitToStore: item.submit_to_store === 'true',
            ossUpload: process.env.OSS_UPLOAD === 'true'
              ? String(process.env.OSS_UPLOAD_RESULT === 'success')
              : process.env.OSS_UPLOAD || '',
            ossDestination: process.env.OSS_DESTINATION || '',
            ossPublicUrl: process.env.OSS_PUBLIC_URL || '',
          };
          const fileName = `${item.target}-${item.artifact_type}.json`.replace(/[^A-Za-z0-9._-]+/g, '-');
          fs.writeFileSync(`.private/release-summaries/${fileName}`, `${JSON.stringify(summary, null, 2)}\n`);
          NODE

      - name: Upload Android release summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-release-summary-${{ matrix.release.target }}-${{ matrix.release.artifact_type }}
          path: .private/release-summaries/*.json
          if-no-files-found: warn
          retention-days: 1

      - name: Upload Android artifact for submit job
        if: matrix.release.submit_to_store == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.release.artifact_name }}
          path: ${{ steps.collect.outputs.artifact_path }}
          if-no-files-found: error
          retention-days: 1

      - name: Cleanup secret files
        if: always()
        run: |
          rm -rf .private
          rm -f source/apps/mobile/android/app/ci-upload.keystore
          rm -f source/apps/mobile/android/app/google-services.json
          rm -f source/apps/mobile/secrets/google-services-prod.json

  submit:
    needs: [prepare, build]
    if: always() && needs.prepare.result == 'success' && needs.prepare.outputs.has_submit == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        release: ${{ fromJson(needs.prepare.outputs.submit_matrix) }}
    concurrency:
      group: mobile-android-google-play-submit
      cancel-in-progress: false
    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.release.artifact_name }}
          path: .private/artifacts

      - name: Setup Ruby for Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Restore Google Play service account
        shell: bash
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          set -euo pipefail
          if [ "${{ matrix.release.artifact_type }}" != "aab" ]; then
            echo "Google Play upload only supports artifact_type=aab in this workflow" >&2
            exit 1
          fi
          test -n "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64" || (echo "GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 is required" >&2; exit 1)
          mkdir -p .private
          printf '%s' "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64" | base64 --decode > .private/google-play-service-account.json

      - name: Upload AAB to Google Play
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_PATH: ${{ github.workspace }}/.private/google-play-service-account.json
          ANDROID_AAB_PATH: ${{ github.workspace }}/.private/artifacts/${{ matrix.release.artifact_name }}
          ANDROID_PACKAGE_NAME: ${{ secrets.ANDROID_PACKAGE_NAME }}
          ANDROID_PLAY_TRACK: ${{ matrix.release.android_track }}
          ANDROID_RELEASE_STATUS: ${{ matrix.release.android_release_status }}
        run: bundle exec fastlane android upload_play

      - name: Cleanup secret files
        if: always()
        run: |
          rm -rf .private

  notify:
    needs: [prepare, build, submit]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      - name: Download Android release summaries
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: android-release-summary-*
          path: .private/release-summaries
          merge-multiple: true

      - name: Notify Feishu release bot
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PREPARE_RESULT: ${{ needs.prepare.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          SUBMIT_RESULT: ${{ needs.submit.result }}
          RELEASE_PLATFORM: android
          RELEASE_REF: ${{ needs.prepare.outputs.safe_ref || env.MOBILE_SOURCE_REF }}
          RELEASE_TARGET: ${{ needs.prepare.outputs.target || env.MOBILE_TARGET }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version || env.MOBILE_VERSION }}
          RELEASE_BUILD_NUMBER: ${{ needs.prepare.outputs.build_number || env.MOBILE_BUILD_NUMBER }}
          RELEASE_ARTIFACT_NAME: ${{ needs.prepare.outputs.artifact_name }}
          RELEASE_ARTIFACTS_JSON_DIR: .private/release-summaries
          RELEASE_SUBMIT_TO_STORE: ${{ needs.prepare.outputs.submit_to_store || env.SUBMIT_TO_STORE }}
        run: node scripts/notify-feishu-release.mjs
